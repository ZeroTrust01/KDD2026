# Baseline experiment configuration
# DIN + DCN V2 on Taobao Ad Dataset

data:
  data_dir: "data/TaobaoAd/processed"
  max_seq_len: 50
  batch_size: 1024
  num_workers: 4

model:
  name: "din_dcnv2"
  embedding_dim: 16
  # DCN V2
  num_cross_layers: 3
  # Parallel DNN
  dnn_hidden_units: [256, 128]
  dnn_dropout: 0.1
  batch_norm: false
  # DIN Attention
  din_pairs:
    - ["cate_id", "cate_seq"]      # ad cate -> behavior cate sequence
    - ["brand", "brand_seq"]        # ad brand -> behavior brand sequence
  attention_hidden_units: [64, 16]
  attention_activation: "Dice"
  din_use_softmax: false

training:
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  epochs: 10
  early_stopping_patience: 3
  lr_scheduler: "cosine"
  gradient_clip: 1.0
  checkpoint_dir: "checkpoints"
